  <rect width="128" height="128" rx="24" fill="#1a2332"/>
  
  <!-- Leaf/Sprout icon - green -->
  <g transform="translate(64, 64)">
    <!-- Left leaf -->
    <path d="M -15 10 Q -25 -5 -20 -25 Q -15 -10 -10 0" fill="none" stroke="#84cc16" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right leaf -->
    <path d="M 15 10 Q 25 -5 20 -25 Q 15 -10 10 0" fill="none" stroke="#84cc16" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Center stem -->
    <line x1="0" y1="10" x2="0" y2="28" stroke="#84cc16" stroke-width="4" stroke-linecap="round"/>
    <!-- Soil -->
    <circle cx="0" cy="32" r="6" fill="#84cc16" opacity="0.6"/>
